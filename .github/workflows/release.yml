# Every push to main is a release (UPD-1), and the apps are released independently:
#
#   a change under android/  -> releases the phone app
#   a change under macos/    -> releases the Mac app
#   a change under core/     -> releases BOTH, because it changed both
#
# Both apps land on ONE release per commit, tagged v0.1.<commit-count>, so a version means the
# same commit everywhere. A release may legitimately carry only one app's assets; both updaters
# know to look back for the newest release that actually contains a build of theirs.
#
# Never push broken code to main: both devices install these themselves.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      macos: ${{ steps.filter.outputs.macos }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version from commit count
        id: version
        # Monotonic only while main is never rewritten: a history-shrinking force-push would lower
        # the versionCode and the phones would silently refuse the "update" as a downgrade.
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "version_code=$COUNT" >> "$GITHUB_OUTPUT"
          echo "version_name=0.1.$COUNT" >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - 'core/**'
              - 'gradle/**'
              - 'gradlew'
              - '*.gradle.kts'
              - 'gradle.properties'
              - '.github/workflows/release.yml'
            android:
              - *shared
              - 'android/**'
            macos:
              - *shared
              - 'macos/**'

  # The release exists before either app uploads to it, so two concurrent jobs cannot race to
  # create the same tag.
  create-release:
    needs: plan
    if: needs.plan.outputs.android == 'true' || needs.plan.outputs.macos == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the release
        run: |
          gh release create "v$VERSION_NAME" --title "v$VERSION_NAME" --generate-notes \
            || echo "release already exists"
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ needs.plan.outputs.version_name }}

  android:
    needs: [plan, create-release]
    if: needs.plan.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # `check` here runs the core's tests on the JVM. The Kotlin/Native half of the suite needs a
      # Mac, so it runs in the macos job — between them, every push proves the monitor on both.
      - name: Check and build the signed APK
        run: >
          ./gradlew :core:testDebugUnitTest :android:lintDebug :android:assembleRelease
          -PreleaseVersionName="$VERSION_NAME"
          -PreleaseVersionCode="$VERSION_CODE"
        env:
          BM_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          BM_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BM_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          VERSION_NAME: ${{ needs.plan.outputs.version_name }}
          VERSION_CODE: ${{ needs.plan.outputs.version_code }}

      # UPD-2: exactly ONE .apk asset per release, or Obtainium cannot resolve which to install and
      # silent background updates stop working.
      - name: Upload the APK
        run: |
          cp android/build/outputs/apk/release/android-release.apk "babymonitor-v$VERSION_NAME.apk"
          gh release upload "v$VERSION_NAME" "babymonitor-v$VERSION_NAME.apk" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ needs.plan.outputs.version_name }}

  macos:
    needs: [plan, create-release]
    if: needs.plan.outputs.macos == 'true'
    # Apple silicon (the app is arm64-only), and macOS 26 for its SDK — not for its OS.
    #
    # A Mac app adopts the current design system only when it is BUILT against the current SDK, so
    # an app compiled on the macos-14 image (SDK 14.5) comes out looking like a 2023 app on a 2026
    # Mac, however new the Mac is. That is not a warning anyone gets: it just quietly looks wrong.
    # macos-26 carries SDK 26.5, which is what the app is developed against, so what ships is what
    # was designed. build.sh refuses to build on anything older rather than ship the old look.
    runs-on: macos-26
    # A macOS runner bills at 10x on a private repo. A build takes minutes; anything approaching
    # this cap means something is hung, and a hung job must not quietly cost a fortune.
    timeout-minutes: 45
    env:
      # The `secrets` context cannot be read from a step's `if`, so notarisation's "do we have
      # credentials?" question is answered once, here, where secrets ARE allowed.
      HAS_NOTARY_KEY: ${{ secrets.APPLE_API_KEY_P8 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      # The camera speaks Opus and no Apple framework decodes it. Homebrew's static libopus.a is
      # linked into the binary, so the shipped app carries no dylib of ours.
      - name: Install libopus
        run: brew install opus

      # The other half of `check`: the SAME spec suite, run on Kotlin/Native. A change that breaks
      # the monitor on macOS alone cannot reach a release.
      - name: Run the spec suite on Kotlin/Native
        run: ./gradlew :core:macosArm64Test

      # The Developer ID certificate. Signing is not cosmetic here: it is what lets the app read its
      # own stored session after an update without stopping to ask for a password (AUTH-6m) — and a
      # monitor that stops at a password box after an overnight update is a monitor that failed.
      - name: Import the signing certificate
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          printf '%s' "$MACOS_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Build the app
        run: ./macos/build.sh release
        env:
          BM_VERSION_NAME: ${{ needs.plan.outputs.version_name }}
          BM_VERSION_CODE: ${{ needs.plan.outputs.version_code }}
          OPUS_PREFIX: /opt/homebrew/opt/opus

      # Notarisation. Deliberately BOUNDED and NON-BLOCKING, for two reasons:
      #
      #  - It only affects the FIRST manual install. A build downloaded through a browser is
      #    quarantined, and Gatekeeper refuses to open an unnotarised app until you right-click →
      #    Open. The app's own updates are downloaded by the app, never quarantined, and never
      #    inspected — so the self-updating path, the one that matters at 3am, does not need this.
      #  - Apple's queue is Apple's queue. It is usually a minute; it has sat for half an hour. A
      #    macOS runner bills at 10x on a private repo, so waiting it out would cost more per
      #    release than the notarisation is worth, and a release must never be held hostage to it.
      #
      # So: give it 15 minutes, and if Apple has not answered, ship anyway. The only consequence is
      # a right-click on a fresh install.
      - name: Notarize and staple
        if: env.HAS_NOTARY_KEY == 'true'
        continue-on-error: true
        run: |
          printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/key.p8"
          ditto -c -k --sequesterRsrc --keepParent macos/build/BabyMonitor.app "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/key.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait --timeout 15m
          xcrun stapler staple macos/build/BabyMonitor.app
          spctl -a -vv -t exec macos/build/BabyMonitor.app
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

      # Two assets, for two different jobs:
      #
      #  - the .zip is what the UPDATER consumes. Every update after the first arrives this way, so
      #    it is the one that has to be right. UPD-3: its SHA-256 ships beside it, and a download
      #    that does not match is discarded rather than run — the one thing standing between a
      #    truncated download and a Mac that will not monitor tonight.
      #  - the .dmg is for the FIRST install only: mount, drag to Applications, done. The updater
      #    never touches it.
      - name: Package and checksum
        run: |
          ZIP="babymonitor-v$VERSION_NAME-macos.zip"
          DMG="babymonitor-v$VERSION_NAME-macos.dmg"

          ditto -c -k --sequesterRsrc --keepParent macos/build/BabyMonitor.app "$ZIP"

          # A staging folder with the app and a shortcut to /Applications, so the drag is obvious.
          STAGE="$RUNNER_TEMP/dmg"
          mkdir -p "$STAGE"
          cp -R macos/build/BabyMonitor.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Baby Monitor" -srcfolder "$STAGE" \
            -ov -format UDZO "$DMG"

          # Signing the disk image too, so Gatekeeper does not object to the container either.
          if security find-identity -v -p codesigning | grep -q "Developer ID Application"; then
            IDENTITY="$(security find-identity -v -p codesigning \
              | grep -m1 "Developer ID Application" | sed -E 's/.*"(.*)"/\1/')"
            codesign --force --sign "$IDENTITY" "$DMG"
          fi

          shasum -a 256 "$ZIP" "$DMG" > checksums.txt
          cat checksums.txt
        env:
          VERSION_NAME: ${{ needs.plan.outputs.version_name }}

      - name: Upload the Mac app
        run: |
          gh release upload "v$VERSION_NAME" \
            "babymonitor-v$VERSION_NAME-macos.zip" \
            "babymonitor-v$VERSION_NAME-macos.dmg" \
            checksums.txt --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ needs.plan.outputs.version_name }}
