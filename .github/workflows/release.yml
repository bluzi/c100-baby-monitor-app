# Every push to main → run checks, build a signed release APK, publish it as a GitHub Release.
# Obtainium on the phones watches these releases; exactly ONE .apk asset per release.
# versionCode = commit count on main (monotonic); versionName/tag = 0.1.<versionCode>.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Compute version from commit count
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "VERSION_CODE=$COUNT" >> "$GITHUB_ENV"
          echo "VERSION_NAME=0.1.$COUNT" >> "$GITHUB_ENV"

      - name: Decode signing keystore
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Check and build signed APK
        run: >
          ./gradlew check assembleRelease
          -PreleaseVersionName="$VERSION_NAME"
          -PreleaseVersionCode="$VERSION_CODE"
        env:
          BM_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          BM_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BM_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Create GitHub Release with APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk "babymonitor-v$VERSION_NAME.apk"
          gh release create "v$VERSION_NAME" "babymonitor-v$VERSION_NAME.apk" \
            --title "v$VERSION_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
